name: ci

# PR-only. A push trigger would double every run and, on merge, re-run the exact
# commit that just passed as a PR -- see the merge-gate note in the README.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The harness's own parsers and assertion evaluators, as pure functions. No
  # server involved, so this is fast and is the gate that actually blocks.
  selftest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
        san: ["0", "1"]
    name: selftest (${{ matrix.cc }}${{ matrix.san == '1' && ' +asan/ubsan' || '' }})
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: build + run self-tests
        env:
          CC: ${{ matrix.cc }}
          SAN: ${{ matrix.san }}
        run: prober/test.sh

  # Compiling the probe against real nginx headers is what proves the generic
  # split is actually generic. It is not enough that it builds standalone: the
  # ngx_* types, the slab pool layout and the ngx_slprintf format specifiers all
  # come from the server, and a mismatch there only shows up here.
  probe-compiles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            url: https://nginx.org/download/nginx-1.29.0.tar.gz
            sha256: 109754dfe8e5169a7a0cf0db6718e7da2db495753308f933f161e525a579a664
          - flavor: angie
            url: https://download.angie.software/files/angie-1.12.0.tar.gz
            sha256: cd7867d200b22a80165b93696c30a1ac3a28c1162544b7f43c71232b19814ef6
    name: probe compiles against ${{ matrix.flavor }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              libpcre2-dev zlib1g-dev libssl-dev

      # Downloaded, checked, THEN unpacked -- never `curl | tar`. Piping
      # straight into tar extracts whatever is served at the moment CI runs,
      # which makes every run trust a third party's current state of mind. The
      # nginx hash below was taken from a tarball whose detached PGP signature
      # verified against Sergey Kandaurov's F5 release key, so it pins a
      # genuine release rather than merely the first thing we happened to see.
      # Angie ships no comparable signature, so its hash is trust-on-first-use:
      # weaker, but it still turns a silent substitution into a failed job.
      - name: fetch ${{ matrix.flavor }}
        run: |
          mkdir -p /tmp/srv
          curl -fsSL -o /tmp/srv.tar.gz "${{ matrix.url }}"
          echo "${{ matrix.sha256 }}  /tmp/srv.tar.gz" | sha256sum -c -
          tar -xzf /tmp/srv.tar.gz -C /tmp/srv --strip-components=1

      - name: configure ${{ matrix.flavor }}
        working-directory: /tmp/srv
        run: ./configure --with-compat --without-http_rewrite_module >/dev/null

      # -DNGX_TEST_HARNESS is the whole point: the file is deliberately empty
      # without it, so a build that forgets the define would "pass" while
      # compiling nothing.
      #
      # Note what is NOT passed: the flavor macros. Those are derived by the
      # header from the server's own version macros, and hard-coding them here
      # would mean CI compiles a configuration no consumer ever builds -- and
      # would skip the detection this job exists to check.
      # -fstack-usage emits a sibling .su file next to each -o output (one
      # line per function -- see the stack-frame-budget step below, which
      # reads these). It costs nothing on a build that is not shipped, so it
      # is on unconditionally here rather than gated behind a second recompile
      # that could drift from what this step actually produces.
      - name: compile the probe
        run: |
          for unit in ngx_test_probe ngx_test_probe_arm; do
              cc -c -o "/tmp/$unit.o" \
                 -DNGX_TEST_HARNESS \
                 -O1 -Wall -Wextra -Werror -Wpointer-arith \
                 -fstack-usage \
                 -I/tmp/srv/src/core -I/tmp/srv/src/event \
                 -I/tmp/srv/src/event/modules -I/tmp/srv/src/os/unix \
                 -I/tmp/srv/src/http -I/tmp/srv/src/http/modules \
                 -I/tmp/srv/objs \
                 "src/$unit.c"
              test -s "/tmp/$unit.o"
          done

          # The two units share ngx_test_probe_hooks, and the renderer reaches
          # it as an extern. Link them together so a missing or duplicated
          # definition fails here rather than in a consumer's build.
          ld -r -o /tmp/probe-combined.o /tmp/ngx_test_probe.o \
                                         /tmp/ngx_test_probe_arm.o

      # Angie defines NGINX_VERSION as well as ANGIE_VERSION, so the flavor
      # detection is a genuine either/or that a compile alone does not exercise
      # -- get the branch backwards and both servers still build, both report
      # "nginx", and every rule that discriminates on flavor silently tests the
      # wrong thing. The string is in the object file, so check it there.
      - name: the detected flavor is ${{ matrix.flavor }}
        run: |
          if ! strings /tmp/ngx_test_probe.o | grep -qx '${{ matrix.flavor }}'; then
              echo "flavor string '${{ matrix.flavor }}' absent from the object;" \
                   "detection in ngx_test_probe.h picked the wrong branch" >&2
              strings /tmp/ngx_test_probe.o | head -20 >&2
              exit 1
          fi

      # The disabled build is a shipped configuration too: consumers build the
      # module without TEST_HARNESS for release, and angie's configure adds
      # -Werror, which is why the empty-TU guard exists at all.
      - name: compile with the harness disabled
        run: |
          for unit in ngx_test_probe ngx_test_probe_arm; do
              cc -c -o "/tmp/$unit-off.o" \
                 -O1 -Wall -Wextra -Werror -Wpointer-arith \
                 -I/tmp/srv/src/core -I/tmp/srv/src/event \
                 -I/tmp/srv/src/event/modules -I/tmp/srv/src/os/unix \
                 -I/tmp/srv/src/http -I/tmp/srv/src/http/modules \
                 -I/tmp/srv/objs \
                 "src/$unit.c"
          done

      # "Never ship the probe in a release build" is policy, not a check, until
      # something actually reads the disabled objects. The file is a deliberate
      # empty TU without -DNGX_TEST_HARNESS (see the compile step above), so
      # this also catches that guard regressing -- if #ifdef NGX_TEST_HARNESS
      # ever narrows to cover less than it should, probe strings leak into the
      # -off.o built here and this is what would notice.
      #
      # `strings` over the whole object also matches the compilation-unit
      # filename GCC stashes in .symtab (e.g. "ngx_test_probe.c" from an
      # otherwise-empty TU), which is a false positive with no bearing on what
      # ships. Pull .rodata/.data out first with objcopy so the check only
      # sees bytes that could actually appear in the running binary's string
      # or data pool.
      - name: harness-disabled build carries no probe strings
        run: |
          # Wildcarded: -O1 merges string literals into .rodata.str1.1, not
          # plain .rodata, so an unwildcarded --only-section would silently
          # extract zero bytes and pass vacuously.
          for unit in ngx_test_probe ngx_test_probe_arm; do
              objcopy -O binary -j '.rodata*' -j '.data*' \
                  "/tmp/$unit-off.o" "/tmp/$unit-off.bin"
          done

          hits=$(strings /tmp/ngx_test_probe-off.bin /tmp/ngx_test_probe_arm-off.bin \
                 | grep -E 'ngx_test_probe|fault_slab' || true)
          if [ -n "$hits" ]; then
              echo "the harness-disabled object contains probe strings -- the" \
                   "#ifdef NGX_TEST_HARNESS guard is not empty in a release" \
                   "build:" >&2
              echo "$hits" >&2
              exit 1
          fi

      # A module may NEVER kill the worker process: exit()/abort()/assert() in
      # a unit that compiles into nginx takes down every other connection that
      # worker is serving, which makes this a correctness bug, not a style
      # nit. strcpy/sprintf/strcat/gets are banned outright regardless of
      # context -- there is no call site in this probe that needs an unbounded
      # copy. `system()` would be a command-injection primitive sitting inside
      # a request-handling path.
      #
      # `nm --undefined-only` lists symbols this object REFERENCES but does
      # not define (type U) -- that is what "calls strcpy" looks like in an
      # object file. Using plain `nm` output without filtering on U would also
      # match, e.g., a local variable that merely happens to be named
      # `assert`, so the type column is load-bearing here. -A prefixes every
      # line with its source file so the two objects can be scanned in one
      # pass without the multi-file "==> file <==" banners `nm` otherwise
      # inserts changing the column layout.
      - name: probe objects call none of the banned libc functions
        run: |
          banned='strcpy|sprintf|strcat|gets|system|exit|_exit|abort|assert|__assert_fail'
          hits=$(nm -A --undefined-only /tmp/ngx_test_probe.o /tmp/ngx_test_probe_arm.o \
                 | awk -v re="^($banned)\$" '$2 == "U" && $3 ~ re {print}')
          if [ -n "$hits" ]; then
              echo "probe object references a banned function -- a module must" \
                   "never kill the worker (exit/abort/assert) or use an" \
                   "unbounded-copy libc call (strcpy/sprintf/strcat/gets/system)" \
                   "in code that compiles into nginx:" >&2
              echo "$hits" >&2
              exit 1
          fi

      # Two modules loaded into the same worker share one flat C symbol
      # namespace -- a second module with an unprefixed global (or one that
      # merely picks the same name) silently collides at link time, or worse,
      # links clean and calls the wrong function. `nm --defined-only` lists
      # symbols this object EXPORTS (T/B/D/R/... -- uppercase = global); the
      # namespace check only makes sense against those. Filtering by type also
      # excludes the compiler's own local-scope symbols (.LC0 string-literal
      # labels, `key.0` for a static const) that nm reports in lowercase and
      # that were never candidates for collision to begin with.
      - name: probe globals are all ngx_test_-prefixed
        run: |
          hits=$(nm -A --defined-only /tmp/ngx_test_probe.o /tmp/ngx_test_probe_arm.o \
                 | awk '$2 ~ /^[A-Z]$/ && $3 !~ /^ngx_test_/ {print}')
          if [ -n "$hits" ]; then
              echo "probe object exports a global symbol not prefixed" \
                   "ngx_test_ -- two modules sharing a worker share one symbol" \
                   "namespace, so an unprefixed export is a silent collision" \
                   "waiting to happen:" >&2
              echo "$hits" >&2
              exit 1
          fi

      # Stack-frame budget. -fstack-usage emits one .su line per function:
      # "file:line:col:func <bytes> <qualifier>", qualifier one of static (the
      # compiler proved an exact size), bounded (the frame has a
      # variable-length piece -- a VLA or a bounded alloca -- but the compiler
      # proved an upper bound, which is the number reported) or dynamic (no
      # upper bound could be proven; the number, if any, is a lower bound and
      # is not the whole story).
      #
      # 4KB, per the TODO. Nginx does not set a custom stack size for worker
      # processes -- they run on whatever RLIMIT_STACK / the pthread default
      # gives them (8MB is typical on Linux, but is not this repo's to assume,
      # since a consuming module's own deployment can lower it) -- so the
      # limit here is not "how many 4KB frames fit," it is recursion depth and
      # call-chain headroom. A worker's C call chain by the time control
      # reaches module code is already several frames deep through nginx's own
      # event/http dispatch, http filter chain, and (for this harness
      # specifically) whatever the consuming module's own handler stacked on
      # top before calling into the probe. 4KB leaves that chain generous
      # headroom while still catching the actual bug class the TODO names: a
      # response buffer, a path buffer, or a scratch array declared on the
      # stack instead of allocated from the request pool. Nothing in this
      # probe legitimately needs anywhere close to 4KB in one frame --
      # ngx_test_probe_json renders into a caller-supplied buffer via pointer
      # arithmetic, it does not stage the document on its own stack.
      #
      # `dynamic` frames are handled by treating "no proven bound" as failing
      # closed: this codebase has no legitimate use for a VLA or alloca sized
      # by unbounded input (the JSON renderer bounds everything against
      # `last`), so a dynamic qualifier here means either a new VLA the review
      # above missed or a compiler that could not analyze the frame -- either
      # way it does not get to self-report as fine. `bounded` is trusted at
      # its reported number, because the compiler proved that number is the
      # ceiling.
      - name: probe stack frames stay under budget
        run: |
          STACK_BUDGET=4096

          fail=0
          for su in /tmp/ngx_test_probe.su /tmp/ngx_test_probe_arm.su; do
              while IFS=$'\t' read -r loc bytes qual; do
                  [ -n "$loc" ] || continue
                  case "$qual" in
                      dynamic)
                          echo "unbounded (dynamic) stack frame -- no compile-time" \
                               "bound was proven, which this codebase has no" \
                               "legitimate reason to need: $loc ($bytes bytes" \
                               "reported, not a ceiling)" >&2
                          fail=1
                          ;;
                      static|dynamic,bounded)
                          if [ "$bytes" -gt "$STACK_BUDGET" ]; then
                              echo "stack frame exceeds ${STACK_BUDGET}-byte budget:" \
                                   "$loc uses $bytes bytes ($qual)" >&2
                              fail=1
                          fi
                          ;;
                      *)
                          echo "unrecognized .su qualifier '$qual' for $loc --" \
                               "treat as failing until this gate knows what it" \
                               "means" >&2
                          fail=1
                          ;;
                  esac
              done < "$su"
          done

          if [ "$fail" -ne 0 ]; then
              exit 1
          fi

      # .o size budget -- the closest honest form of the TODO's ".so size
      # budget" gate for what this repo actually builds. There is no .so
      # here: the probe compiles as two relocatable objects that a CONSUMING
      # module links into its own nginx/angie .so, so this repo has no
      # artifact to weigh against a shared-object budget in the TODO's literal
      # sense. What it does own is the object-code footprint it hands to that
      # consumer, and that number creeping up silently (a debug helper left
      # in, a table that should have been computed instead of unrolled) is the
      # same "bloat-creep" failure mode the TODO is guarding against, one
      # layer down the pipeline.
      #
      # Budget is on the linked (`ld -r`) combined object, .text+.data+.bss,
      # via `size`'s decimal total -- the whole footprint a consumer's link
      # step pays for, not just code. Current size is under 5KB; 16KB gives
      # ~3x headroom for legitimate growth (a new hook, a new probe field)
      # while still catching an accidental multi-KB regression (an unrolled
      # table, a copy-pasted duplicate of the renderer) the same day it lands.
      - name: probe object size stays under budget
        run: |
          SIZE_BUDGET=16384

          total=$(size /tmp/probe-combined.o | awk 'NR==2 {print $4}')
          if [ "$total" -gt "$SIZE_BUDGET" ]; then
              echo "combined probe object exceeds ${SIZE_BUDGET}-byte budget:" \
                   "$total bytes (text+data+bss) -- see 'size" \
                   "/tmp/probe-combined.o' for the breakdown" >&2
              exit 1
          fi

  # Every header a consumer might #include on its own must not silently
  # depend on some OTHER header having been included first -- that kind of
  # hidden dependency only surfaces once a consumer's include order happens
  # to differ from this repo's own, which is exactly when it is hardest to
  # debug.
  #
  # "Standalone" means something different in each directory here, and
  # faking a uniform pass by excluding whatever does not fit would defeat the
  # gate:
  #
  #   - prober/*.h are real, freestanding C headers with no nginx dependency
  #     at all (the prober is a plain userspace program). Every one of them
  #     must compile with -fsyntax-only given nothing but -I prober, full
  #     stop.
  #   - t/ngx_core.h, t/ngx_config.h and t/ngx_shim.h are deliberately NOT
  #     real nginx headers -- they are a purpose-built shim (see the comment
  #     atop t/ngx_shim.h) that exists only to satisfy #include <ngx_config.h>
  #     / <ngx_core.h> for the one file that needs it. They are self-
  #     contained by construction (ngx_config.h and ngx_core.h just #include
  #     "ngx_shim.h", which pulls in nothing but libc headers), so they are
  #     held to the same "-fsyntax-only, -I t, nothing else" standard.
  #   - src/ngx_test_probe.h explicitly documents that it depends on real
  #     <ngx_config.h> / <ngx_core.h> (see its own header comment: "this
  #     depends only on <ngx_core.h>"). That is a deliberate, minimal,
  #     DOCUMENTED dependency, not a hidden one -- the whole point of the
  #     probe-compiles job above is proving this header and the .c files that
  #     include it build clean against real nginx AND real angie headers,
  #     which is a strictly stronger check than -fsyntax-only against a stub.
  #     Re-testing it here with the t/ shim would either (a) fail for a
  #     reason that has nothing to do with a hidden dependency -- the shim is
  #     deliberately minimal and does not carry ngx_module.h /
  #     ngx_core_module.h et al -- or (b) require growing the shim into a
  #     second, divergent partial nginx, which is the coupling the shim's own
  #     comment already rejects. So it is excluded here, WITH this comment,
  #     not silently -- and it is still gated, just by the stronger check
  #     already running in probe-compiles.
  header-self-sufficiency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: prober/*.h compile standalone
        run: |
          fail=0
          for h in prober/*.h; do
              echo "-- $h"
              if ! gcc -fsyntax-only -std=c11 -Wall -Wextra -I prober "$h"; then
                  fail=1
              fi
          done
          if [ "$fail" -ne 0 ]; then
              echo "one or more prober/*.h headers do not compile standalone" \
                   "-- a header must not depend on some other header having" \
                   "been included first" >&2
              exit 1
          fi

      - name: t/ shim headers compile standalone
        run: |
          fail=0
          for h in t/ngx_core.h t/ngx_config.h t/ngx_shim.h; do
              echo "-- $h"
              if ! gcc -fsyntax-only -std=c11 -Wall -Wextra -I t "$h"; then
                  fail=1
              fi
          done
          if [ "$fail" -ne 0 ]; then
              echo "one or more t/ shim headers do not compile standalone" >&2
              exit 1
          fi

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck prober/build.sh prober/test.sh prober/run.sh

      # Downloaded and hash-checked, same as the server tarballs above: a
      # linter that gates the build is as much a supply-chain dependency as
      # the code it lints.
      #
      # Note the absence of `|| true` and of any grep over the output. An
      # earlier version of this step captured SARIF and grepped it for a
      # severity string, which fails OPEN in two ways at once: the `|| true`
      # discards the real exit status, and a formatting change in the JSON
      # (or a severity spelled anything other than the grepped literal) makes
      # the pattern silently stop matching. A gate whose failure mode is
      # "passes quietly forever" is worse than no gate. actionlint already
      # exits non-zero on findings -- let it.
      - name: actionlint
        run: |
          curl -fsSL -o /tmp/actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tar.gz" \
              | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          # A bare directory is not accepted -- actionlint takes files, so glob.
          /tmp/actionlint -color .github/workflows/*.yml

      # zizmor audits workflows for script injection, unpinned actions and
      # over-broad permissions. Installed from the published wheel at a pinned
      # version rather than `cargo install` from git: a source build here would
      # be minutes of CI for a linter.
      #
      # --persona=regular, not pedantic. Pedantic flags every `${{ matrix.* }}`
      # interpolation in a run block as template injection. Here that is a
      # false positive by construction: the matrix is defined inline in this
      # same file with hardcoded tarball URLs, hashes and flavor names, so
      # nothing attacker-controllable reaches those expansions. The remaining
      # pedantic notes are `anonymous-definition` (jobs without a `name:`),
      # which is cosmetic. Regular still catches the findings that matter --
      # an unpinned action, a widened permission, a genuinely external input.
      - name: zizmor
        run: |
          pipx install zizmor==1.26.1
          zizmor --persona=regular .github/workflows/*.yml

  # Two gates that each close a bug class this repo already shipped once. Both
  # are static in the sense that they assert on the repository itself rather
  # than on behaviour, so they belong together in one cheap job.
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      # PR #6 committed a compiled assert_test binary. Nothing caught it: the
      # file was tracked, so .gitignore no longer applied to it, and every
      # other job happily rebuilt over the top. Ask `file` about every tracked
      # path instead -- an ELF that is checked in is always a mistake here,
      # since this repo ships only C sources and shell.
      - name: no tracked file is an ELF binary
        run: |
          hits=$(git ls-files -z | xargs -0 file --separator ':' -- \
                 | grep ' ELF ' || true)
          if [ -n "$hits" ]; then
              echo "tracked ELF binaries found -- compiled output must never be" \
                   "committed; check .gitignore and 'git rm --cached' these:" >&2
              echo "$hits" >&2
              exit 1
          fi

      # PR #4 let a new build artifact escape .gitignore. The artifact is only
      # created by a build, so the drift is invisible to a checkout-only job --
      # it has to actually build and run the suite first, then look. Both the
      # plain and the sanitizer build are checked because SAN=1 is a distinct
      # set of outputs.
      - name: build + test leaves the tree clean
        run: |
          for san in 0 1; do
              SAN="$san" prober/test.sh >/dev/null

              dirty=$(git status --porcelain)
              if [ -n "$dirty" ]; then
                  echo "SAN=$san build/test left the working tree dirty --" \
                       "an artifact is missing from .gitignore:" >&2
                  echo "$dirty" >&2
                  exit 1
              fi
          done

  # Reproducible build. Build the same source twice and require the binaries to
  # be byte-identical, which catches a build embedding something that is not the
  # source: __DATE__/__TIME__, an absolute path, a hostname, anything read from
  # the environment at compile time. That matters here because a consumer links
  # this repo's objects into their own module -- an artifact that varies run to
  # run cannot be diffed against a rebuild, so "is the .so I am shipping built
  # from the commit I think it is" stops being an answerable question.
  #
  # The two builds are deliberately done at DIFFERENT paths (a longer directory
  # name, not merely a different one). Building twice at the same path is the
  # tempting shortcut and it is a vacuous gate: -g embeds the compilation
  # directory in .debug_line_str, so a same-path pair compares equal while the
  # path is still baked into the artifact -- the very thing this is supposed to
  # detect. Differing path LENGTHS also shift section offsets if anything
  # downstream depends on them, so the check fails loudly rather than subtly.
  #
  # One flag is required to make this pass, and it is the fix rather than a
  # workaround for it:
  #
  #   -ffile-prefix-map=$PWD=.  rewrites the recorded compilation directory to a
  #       relative marker. Without it, -g (on by default in build.sh) writes the
  #       absolute build path into DWARF. Measured: with this flag removed, all
  #       six artifacts differ, by exactly the bytes spelling the directory name.
  #
  # The GNU build-ID is deliberately NOT suppressed. An earlier draft of this
  # job passed -Wl,--build-id=none on the theory that the note is a per-link
  # hash and would differ between runs. Mutation-tested: removing the flag
  # leaves this gate green, because ld derives the build-ID from the linked
  # content, which is identical once the paths are mapped away. The build-ID
  # differences seen while first investigating this were a CONSEQUENCE of the
  # embedded paths, not an independent source of nondeterminism. Suppressing it
  # would therefore have hidden nothing and cost the artifacts their build-ID,
  # which debuggers and coredump tooling use -- so the note stays, and it is now
  # part of what this gate proves stable.
  #
  # SOURCE_DATE_EPOCH is exported for the same reason: it gives any timestamp a
  # build might reach for a fixed value instead of "now".
  reproducible-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: the same source builds byte-identically twice
        env:
          SOURCE_DATE_EPOCH: "1"
        run: |
          # Deliberately different lengths -- see the note above on why an
          # equal-length pair would let path embedding through.
          a=/tmp/rb-a
          b=/tmp/rb-b-deliberately-longer

          rm -rf "$a" "$b"
          cp -a . "$a"
          cp -a . "$b"

          for d in "$a" "$b"; do
              (
                  cd "$d"
                  CFLAGS="-O1 -g -std=c11 -Wall -Wextra -Werror \
                          -Wconversion -Wsign-conversion -Wshadow -Wvla \
                          -Wformat=2 -Wwrite-strings -Wcast-qual \
                          -Wpointer-arith -Wdeclaration-after-statement \
                          -ffile-prefix-map=$d=." \
                      prober/build.sh >/dev/null
              )
          done

          # Compare every built artifact, not just the prober: a self-test
          # binary that embeds a path is the same bug, and checking only the
          # one obvious output is how a gate ends up covering less than its
          # name claims.
          fail=0
          for artifact in "$a"/prober/prober "$a"/prober/*_test "$a"/t/*_test; do
              [ -e "$artifact" ] || continue
              rel="${artifact#"$a"/}"
              if ! cmp -s "$artifact" "$b/$rel"; then
                  echo "not reproducible: $rel differs between two builds of" \
                       "identical source at different paths" >&2
                  cmp -l "$artifact" "$b/$rel" | head -20 >&2
                  fail=1
              fi
          done

          if [ "$fail" -ne 0 ]; then
              echo "" >&2
              echo "Something path-, time- or environment-dependent is being" \
                   "compiled in. Check for __DATE__/__TIME__, __FILE__ reaching" \
                   "a shipped string, or a new flag that defeats" \
                   "-ffile-prefix-map." >&2
              exit 1
          fi

  # Static analyzers. These read the prober's own C -- the rule parser, the JSON
  # parser and the HTTP response parser -- which is the half of this repo that
  # eats untrusted-shaped bytes. The probe half in src/ is deliberately NOT
  # analyzed here: it only compiles against real nginx headers, so it is covered
  # by the probe-compiles job, and pointing an analyzer at it with the t/ shim
  # would analyze a stub rather than what ships.
  #
  # All three run as BLOCKING gates rather than advisory reports. At the time
  # this job was added all three were clean on current source, so there is no
  # backlog to grandfather in -- which means any finding is new, and a gate that
  # fails on new findings is worth more than a report nobody reads. The check
  # selections below are therefore load-bearing: each exclusion is a category
  # judged unactionable for THIS codebase, not a way to reach zero.
  analyzers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      # Versions are printed, not merely installed. These gates are only as
      # reproducible as the tools behind them, and the analyzers disagree with
      # each other across releases: the clang-tidy suppression below exists for
      # a finding that the runner's clang-tidy reports and 19.1.7 does not. When
      # a future run fails on something that passes locally, the first question
      # is "which version", and it should be answerable from the log rather than
      # by bisecting a runner image.
      - name: install analyzers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-tidy

          echo "--- analyzer versions ---"
          gcc --version | head -1
          cppcheck --version
          clang-tidy --version | grep -i 'version'

      # GCC's own analyzer. Clean on current source with no exclusions at all,
      # so it runs with the plain flag set and -Werror: anything it says is
      # both new and, by this codebase's track record with it, worth reading.
      - name: gcc -fanalyzer
        working-directory: prober
        run: |
          for f in json.c http.c util.c rules.c assert.c prober.c; do
              gcc -fanalyzer -Werror -c -O1 -std=c11 -I. "$f" -o /dev/null
          done

      # cppcheck. --error-exitcode=2 is what makes this a gate; without it
      # cppcheck prints findings and exits 0, which is the "passes quietly
      # forever" failure mode the actionlint step above was already fixed for.
      #
      # `style` is off deliberately. The only two style findings on current
      # source are constVariablePointer suggestions on strtok() results that
      # share a declaration line with pointers which genuinely are mutated --
      # taking the advice would mean splitting declarations for no defect.
      # warning/performance/portability stay on: those are the bug-finding
      # checks.
      #
      # normalCheckLevelMaxBranches is an informational note about analysis
      # depth, not a finding, and --check-level=exhaustive is what answers it.
      - name: cppcheck
        working-directory: prober
        run: |
          cppcheck \
              --enable=warning,performance,portability \
              --std=c11 --check-level=exhaustive \
              --error-exitcode=2 --quiet \
              --suppress=normalCheckLevelMaxBranches \
              -I. json.c http.c util.c rules.c assert.c prober.c

      # clang-tidy. --warnings-as-errors mirrors the enabled list so a finding
      # fails the job.
      #
      # Four categories are excluded, each for a reason that is about this
      # codebase rather than about reaching a clean run:
      #
      #   security.insecureAPI.DeprecatedOrUnsafeBufferHandling
      #       Demands the C11 Annex K _s functions (memcpy_s, snprintf_s).
      #       Annex K is optional, glibc does not implement it, and there is
      #       nothing to migrate to. Every call it flags is already a bounded
      #       form (memcpy with a checked length, snprintf with sizeof).
      #   cert-err33-c
      #       Flags ignoring snprintf's return value. Every site is a
      #       diagnostic message rendered into a fixed buffer where truncation
      #       is the intended, acceptable outcome -- the alternative is
      #       error-handling a failure to format an error.
      #   bugprone-reserved-identifier / cert-dcl37-c
      #       Fires on #define _GNU_SOURCE, which is a required feature-test
      #       macro and cannot be spelled any other way. ALL THREE names are
      #       needed: clang-tidy reports this one under two cert- aliases as
      #       well, and excluding only the bugprone- spelling leaves it firing
      #       (each alias had to be excluded in turn before the run went clean).
      #   bugprone-easily-swappable-parameters
      #       A design opinion about adjacent same-typed parameters, not a
      #       defect. Acting on it would mean restructuring working signatures.
      #   bugprone-multi-level-implicit-pointer-conversion
      #       Fires on `T **p = realloc(...)`, which is how you grow an array
      #       of pointers in C. Every site is NULL-checked. The suggested
      #       explicit cast would add noise without changing behaviour.
      #   bugprone-implicit-widening-of-multiplication-result
      #       One site: (timeout_ms % 1000) * 1000 assigned to tv_usec. The
      #       modulo bounds the left operand at 999, so the product cannot
      #       exceed 999000 and int arithmetic is exact -- the widening the
      #       check warns about has nothing to truncate.
      - name: clang-tidy
        working-directory: prober
        run: |
          checks='-*,bugprone-*,cert-*,clang-analyzer-*'
          checks="$checks,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling"
          checks="$checks,-cert-err33-c"
          checks="$checks,-bugprone-reserved-identifier,-cert-dcl37-c,-cert-dcl51-cpp"
          checks="$checks,-bugprone-easily-swappable-parameters"
          checks="$checks,-bugprone-multi-level-implicit-pointer-conversion"
          checks="$checks,-bugprone-implicit-widening-of-multiplication-result"

          clang-tidy --quiet \
              --checks="$checks" \
              --warnings-as-errors="$checks" \
              json.c http.c util.c rules.c assert.c prober.c \
              -- -std=c11 -I.

  # License-header gate: all .c and .h files must carry BSD-2-Clause SPDX
  # identifier (project policy for nginx modules).
  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: every .c and .h carries BSD-2-Clause header
        run: |
          missing_header=0
          for f in $(git ls-files | grep -E '\.(c|h)$'); do
              if ! head -3 "$f" | grep -q "SPDX-License-Identifier: BSD-2-Clause"; then
                  echo "missing BSD-2-Clause header: $f" >&2
                  missing_header=1
              fi
          done
          if [ "$missing_header" -eq 1 ]; then
              echo "All .c and .h files must include SPDX-License-Identifier: BSD-2-Clause header." >&2
              exit 1
          fi
