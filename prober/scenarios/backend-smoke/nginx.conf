@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 16; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # The fake upstream is driven through nginx's own memcached client
        # rather than through a module written for this scenario. fakesrv
        # speaks memcached, ngx_http_memcached_module is in every stock build,
        # and the pairing means the CORRECTNESS being asserted here is
        # fakesrv's -- not that of a client also written by this repo. A fake
        # and a client that agree because the same author wrote both prove
        # nothing about either.
        location /mc {
            set $memcached_key $arg_key;
            memcached_pass 127.0.0.1:@BACKEND_PORT@;

            # A miss is a legitimate answer this scenario asserts on, so it
            # must reach the client as a 404 rather than being turned into an
            # error page that hides which layer produced it.
            error_page 404 = @miss;
        }

        location @miss { return 404 "MISS\n"; }

        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
