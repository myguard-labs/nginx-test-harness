@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 16; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # No upstream keepalive block: each request opens its own connection, so
        # the length lie is exercised on a fresh frame every time and a failed
        # request cannot poison a pooled connection for the next case.
        location /mc {
            set $memcached_key $arg_key;
            memcached_pass 127.0.0.1:@BACKEND_PORT@;
            # Bound the wait: a length lie that OVERCOUNTS makes the client block
            # for bytes that never arrive. Without a short read timeout it would
            # hang for the default 60 s, past any CI budget, and the scenario
            # would time out rather than observe the framing failure. 1 s is far
            # longer than a healthy reply on loopback yet finite.
            memcached_read_timeout 1s;
            error_page 404 = @miss;
            error_page 502 504 = @bad;
        }
        location @miss { return 404 "MISS\n"; }
        location @bad  { return 200 "BADGATEWAY\n"; }

        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
