@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 32; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # Generous on purpose: the corpus deliberately includes an oversize
        # header value (long-header-value.frag), and a 400 at header-parse
        # time would short-circuit before the property under test -- the
        # request-path teardown -- ever runs.
        large_client_header_buffers 16 64k;

        # The backend leg. Faults fire against a memcached get, keyed by
        # occurrence, in ./backend. No upstream keepalive: each generated
        # case opens its own connection, so a failed request cannot poison a
        # pooled connection for the next one (same reasoning as
        # backend-lying-length/nginx.conf).
        location /mc {
            set $memcached_key $arg_key;
            memcached_pass 127.0.0.1:@BACKEND_PORT@;
            memcached_read_timeout 1s;
            error_page 404      = @miss;
            error_page 502 504  = @gone;
        }
        location @miss { return 404 "MISS\n"; }
        location @gone { return 200 "GONE\n"; }

        # The general fuzz leg: whatever the corpus fragment's request line
        # asks for lands here.
        location / { return 200 "OK\n"; }

        location /__probe { @PROBE@ }
    }
}
