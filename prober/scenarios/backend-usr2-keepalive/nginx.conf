@LOAD@
# daemon ON, not off: a USR2 binary upgrade is IGNORED under daemon off. nginx's
# ngx_signal_handler drops NGX_CHANGEBIN when getppid()==ngx_parent, which always
# holds for a foregrounded (daemon off) master whose parent is prober_boot's `&`
# launcher -- the master then logs "the changing binary signal is ignored", no
# .oldbin appears and no new master forks. The PROBER_DAEMON_MODE=on opt-in in
# this scenario's env lets the harness track a daemonized master by its pidfile
# instead of by $!, so the upgrade path is reachable at all. See prober_check_conf
# and prober_boot in lib.sh, and TODO.md's P1-D backend-usr2-keepalive row.
daemon on;
# The pidfile MUST be at this exact path: with daemon on the master is not $!,
# so prober_boot adopts the master pid from this file and teardown kills it from
# here. prober_check_conf bails if the opt-in is set and this path is not written.
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 16; }
http {
    @PROBE_ZONE@

    # A keepalive-enabled upstream is the point: without `keepalive` the
    # memcached client opens and closes a connection per request and there is no
    # parked descriptor to survive (or not survive) the binary upgrade, so the
    # fresh-worker reconnect this scenario proves would never be a question.
    upstream mc {
        server 127.0.0.1:@BACKEND_PORT@;
        keepalive 4;
    }

    server {
        listen 127.0.0.1:@PORT@;

        location /mc {
            set $memcached_key $arg_key;
            memcached_pass mc;
            error_page 404 = @miss;
        }
        location @miss { return 404 "MISS\n"; }

        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
