@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;

# multi_accept on so ONE listen-socket wakeup drains the whole accept queue:
# the open_conns directive parks its idle connections all at once, and without
# this the worker would accept them one event at a time and the probe could read
# a count that lags the sockets the prober has actually opened.
events {
    worker_connections 64;
    multi_accept on;
}

http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # Generous timeouts: the parked connections are idle and unread by
        # design, so nothing here may reap them before the probe reads the
        # count -- a timeout firing would return the slot for its own reason and
        # the saturation assertion would pass without open_conns proving a thing.
        client_header_timeout 60s;
        client_body_timeout   60s;
        keepalive_timeout     60s;

        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
