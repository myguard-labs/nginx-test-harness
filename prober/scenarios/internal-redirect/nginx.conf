@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 10; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;
        # `=200` rewrites the status on the way out. Without it error_page
        # preserves the ORIGINAL 404, so the fallback body is served under a
        # 404 and the rules' `expect status=200` fails while the internal
        # redirect itself worked perfectly -- the re-entry path this scenario
        # tests is exercised either way.
        location /trigger-error { error_page 404 =200 /fallback; return 404; }
        location /fallback { return 200 "OK from fallback\n"; }
        location /__probe { @PROBE@ }
    }
}
