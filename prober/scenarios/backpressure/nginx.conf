@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 128; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # Generous, for the same reason conn-delta is: a timeout firing would
        # reclaim the connection for its own reasons and every assertion below
        # would pass without the blocked-write path running at all. The pacing
        # here is measured in hundreds of milliseconds; these are in seconds.
        client_header_timeout 60s;
        client_body_timeout   60s;
        send_timeout          60s;
        keepalive_timeout     60s;

        # Backpressure only exists if the response cannot be absorbed in one
        # write. Two settings decide that, and both matter:
        #
        # postpone_output 0 stops nginx coalescing the response before the
        # first write. With the default (1460) a body this size leaves in a
        # single writev once the headers are ready, and the send buffer never
        # fills -- the scenario would go green having tested nothing.
        #
        # output_buffers is deliberately small so the filter chain hands the
        # connection down in pieces rather than as one buffer. A module that
        # mishandles a partial write shows it between those pieces.
        postpone_output 0;
        output_buffers  2 1k;

        # sendfile/aio would move the body out through a path that bypasses the
        # ordinary write filter, which is the path under test. Off on purpose.
        sendfile off;
        aio      off;

        # gzip would shrink the body back under the window and undo the whole
        # arrangement above.
        gzip off;

        location / { return 200 "OK\n"; }

        # ~1.7KB of body against the 128-to-512-byte receive windows the rules
        # set: the response cannot leave in one write, so the worker must park
        # the connection, wait for writability, and resume -- repeatedly. The
        # content is filler; only its length is load-bearing.
        #
        # The size is bounded from above by nginx itself: a single quoted conf
        # token may not exceed 4096 bytes ("too long parameter, probably missing
        # terminating \"\" character"), and the escaped form is longer than the
        # body it renders. Growing this block is therefore not the way to make
        # the test harder -- shrinking the window in the rule file is.
        location /bulk {
            default_type text/plain;
            return 200
"backpressure padding block 01 -- filler; length is the point.\nbackpressure padding block 02 -- filler; length is the point.\nbackpressure padding block 03 -- filler; length is the point.\nbackpressure padding block 04 -- filler; length is the point.\nbackpressure padding block 05 -- filler; length is the point.\nbackpressure padding block 06 -- filler; length is the point.\nbackpressure padding block 07 -- filler; length is the point.\nbackpressure padding block 08 -- filler; length is the point.\nbackpressure padding block 09 -- filler; length is the point.\nbackpressure padding block 10 -- filler; length is the point.\nbackpressure padding block 11 -- filler; length is the point.\nbackpressure padding block 12 -- filler; length is the point.\nbackpressure padding block 13 -- filler; length is the point.\nbackpressure padding block 14 -- filler; length is the point.\nbackpressure padding block 15 -- filler; length is the point.\nbackpressure padding block 16 -- filler; length is the point.\nbackpressure padding block 17 -- filler; length is the point.\nbackpressure padding block 18 -- filler; length is the point.\nbackpressure padding block 19 -- filler; length is the point.\nbackpressure padding block 20 -- filler; length is the point.\nbackpressure padding block 21 -- filler; length is the point.\nbackpressure padding block 22 -- filler; length is the point.\nbackpressure padding block 23 -- filler; length is the point.\nbackpressure padding block 24 -- filler; length is the point.\nbackpressure padding block 25 -- filler; length is the point.\nbackpressure padding block 26 -- filler; length is the point.\nbackpressure padding block 27 -- filler; length is the point.\nbackpressure padding block 28 -- filler; length is the point.\n";
        }

        location /__probe { @PROBE@ }
    }
}
