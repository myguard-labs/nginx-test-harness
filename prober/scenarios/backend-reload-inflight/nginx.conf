@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 16; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # Driven through nginx's own memcached client (see backend-smoke for
        # why the fake is paired with a stock client rather than one written
        # here). The drip fault on the upstream is what keeps the response in
        # flight across the reload.
        location /mc {
            set $memcached_key $arg_key;
            memcached_pass 127.0.0.1:@BACKEND_PORT@;
            error_page 404 = @miss;
        }
        location @miss { return 404 "MISS\n"; }

        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
