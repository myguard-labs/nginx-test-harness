@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 16; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # Deliberately generous: this scenario asserts that connections torn
        # down on ERROR paths are reclaimed, so nothing here may cut a slow or
        # half-dead client off early. A timeout firing would reclaim the
        # connection for its own reasons and the assertion would pass without
        # the cleanup path ever being exercised.
        client_header_timeout 60s;
        client_body_timeout   60s;
        keepalive_timeout     60s;

        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
