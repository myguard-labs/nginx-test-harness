@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 16; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;

        # The marker below is what the driver REWRITES in the RENDERED conf
        # between reloads, so that "the new config is live" is a claim with
        # something observable behind it rather than a counter asserting about
        # itself. The driver rewrites the number, reloads, and requires the
        # response body to carry the new value (driver.sh, oracle 3).
        #
        # Rewritten with sed against this exact line, so its shape is load
        # bearing: one `return 200` carrying `marker=<digits>`. The driver
        # fails loudly if the substitution matches nothing rather than
        # reloading an unchanged config and certifying a no-op.
        location / { return 200 "marker=1\n"; }
        location /__probe { @PROBE@ }
    }
}
