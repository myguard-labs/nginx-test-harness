@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 16; }
http {
    @PROBE_ZONE@

    # A keepalive-enabled upstream is the point: without `keepalive` the
    # memcached client opens and closes a connection per request and there is no
    # parked descriptor for the backend to close underneath, so the reconnect
    # path this scenario exercises would never be taken.
    upstream mc {
        server 127.0.0.1:@BACKEND_PORT@;
        keepalive 4;
    }

    server {
        listen 127.0.0.1:@PORT@;

        location /mc {
            set $memcached_key $arg_key;
            memcached_pass mc;
            # keepalive upstream requires HTTP/1.1 + cleared Connection so the
            # client parks the connection rather than closing it per request.
            error_page 404 = @miss;
        }
        location @miss { return 404 "MISS\n"; }

        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
