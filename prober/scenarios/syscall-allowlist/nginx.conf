@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
# One worker: the driver straces exactly ONE process and asserts on ITS syscall
# set. Several workers would split the request load across pids the strace never
# attached to, so a syscall made only by an un-straced worker would slip the
# allowlist -- the gate would read as green while blind to most of the fleet.
worker_processes 1;
events { worker_connections 32; }
http {
    @PROBE_ZONE@
    server {
        listen 127.0.0.1:@PORT@;
        # A bare 200 and the probe are all this scenario needs: it asserts on
        # WHICH syscalls the request path makes, not on the response. Keeping the
        # served location trivial keeps the baseline syscall set minimal, so a
        # module that adds one (a getrandom, an openat, a socket) stands out.
        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
