@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 10; }
http {
    @PROBE_ZONE@
    keepalive_timeout 30;
    server {
        listen 127.0.0.1:@PORT@;

        # Three distinguishable responses, so a bleed between requests on a
        # reused connection shows up as the WRONG body coming back for a block
        # rather than merely a status change. A keepalive pipeline that folded
        # or corrupted responses would hand a later block a body naming an
        # earlier path.
        location /alpha { return 200 "ALPHA-body\n"; }
        location /bravo { return 200 "BRAVO-body\n"; }
        location /       { return 200 "ROOT-body\n"; }
        location /__probe { @PROBE@ }
    }
}
