@LOAD@
daemon off;
pid @PREFIX@/nginx.pid;
error_log @PREFIX@/logs/error.log info;
worker_processes 1;
events { worker_connections 128; }
http {
    @PROBE_ZONE@
    # Deliberately generous so a large-but-legal request reaches the probe
    # handler (200) instead of being rejected at header parse (400). The point
    # of this scenario is that a request's OWN buffers -- which nginx sizes from
    # these limits and allocates in the request pool -- grow with request size
    # yet leave the long-lived cycle pool flat. A 400 short-circuits before the
    # probe runs and proves nothing.
    # A SMALL initial buffer on purpose: with client_header_buffer_size left
    # large, the whole ~30 KiB request line and each ~48 KiB header value fit
    # in the initial buffer and nginx never touches large_client_header_buffers
    # -- the very allocation path this scenario exists to exercise. 8k forces
    # the big request line and header values to overflow into the large buffers
    # (copied out of the initial one), which is where a request-sized leak would
    # hide. The large buffers stay generous so the values still fit (200, not
    # 400/414) once promoted.
    large_client_header_buffers 16 64k;
    client_header_buffer_size 8k;
    server {
        listen 127.0.0.1:@PORT@;
        location / { return 200 "OK\n"; }
        location /__probe { @PROBE@ }
    }
}
